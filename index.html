<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <title>Bara Al-Wa7sh</title>
    <link rel="preconnect" href="https://vidapi.ru">
    <link rel="preconnect" href="https://vaplayer.ru">
    <link rel="preconnect" href="https://image.tmdb.org">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Primary">
        <a class="brand" href="#" aria-label="Bara Al-Wa7sh home">
          <span class="brand-mark">B</span>
          <span>Bara Al-Wa7sh</span>
        </a>

        <nav class="nav-tabs" aria-label="Sections">
          <button class="nav-tab is-active" type="button" data-view="all">
            <i data-lucide="sparkles"></i>
            <span>Discover</span>
          </button>
          <button class="nav-tab" type="button" data-view="movies">
            <i data-lucide="clapperboard"></i>
            <span>Movies</span>
          </button>
          <button class="nav-tab" type="button" data-view="tv">
            <i data-lucide="tv"></i>
            <span>TV Shows</span>
          </button>
          <button class="nav-tab" type="button" id="openIdTrigger">
            <i data-lucide="hash"></i>
            <span>Open ID</span>
          </button>
          <button class="nav-tab" type="button" data-view="watchlist">
            <i data-lucide="bookmark"></i>
            <span>Saved</span>
          </button>
        </nav>

        <section class="stats-panel" aria-label="Library stats">
          <div>
            <span class="stat-value" id="statMovies">...</span>
            <span class="stat-label">Movies</span>
          </div>
          <div>
            <span class="stat-value" id="statShows">...</span>
            <span class="stat-label">Shows</span>
          </div>
          <div>
            <span class="stat-value" id="statEpisodes">...</span>
            <span class="stat-label">Episodes</span>
          </div>
        </section>
      </aside>

      <main class="workspace">
        <section class="browse-page" id="browsePage">
          <header class="topbar">
            <form class="search-form" id="searchForm">
              <label class="visually-hidden" for="searchInput">Search</label>
              <i data-lucide="search"></i>
              <input id="searchInput" type="search" autocomplete="off" placeholder="Search movies and shows">
              <button class="icon-button" type="submit" aria-label="Search" title="Search">
                <i data-lucide="arrow-right"></i>
              </button>
            </form>

            <div class="toolbar-actions">
              <select id="sortSelect" aria-label="Sort">
                <option value="relevance">Relevance</option>
                <option value="latest">Latest</option>
                <option value="rating">Top rated</option>
                <option value="popularity">Popular</option>
                <option value="year">Year</option>
                <option value="az">A to Z</option>
              </select>
              <button class="ghost-button" type="button" id="refreshCatalog">
                <i data-lucide="refresh-cw"></i>
                <span>Refresh</span>
              </button>
            </div>
          </header>

          <section class="browse-hero" id="browseHero" aria-label="Featured title">
            <div class="browse-hero-backdrop" id="browseHeroBackdrop"></div>
            <div class="browse-hero-content">
              <p class="eyebrow" id="heroEyebrow">Featured</p>
              <h1 id="heroTitle">Loading titles</h1>
              <p class="hero-meta" id="heroMeta"></p>
              <div class="hero-actions">
                <button class="primary-button" type="button" id="heroPlay" disabled>
                  <i data-lucide="play"></i>
                  <span>Play</span>
                </button>
                <button class="ghost-button" type="button" id="heroSave" disabled>
                  <i data-lucide="plus"></i>
                  <span>My List</span>
                </button>
              </div>
            </div>
          </section>

          <section class="shelf-stack" id="shelfStack" aria-label="Browse titles"></section>

          <section class="content-band" id="contentBand" aria-live="polite">
            <div class="section-heading">
              <div>
                <p class="eyebrow" id="resultEyebrow">Explore</p>
                <h2 id="resultTitle">Latest Picks</h2>
              </div>
              <span id="resultCount">0 titles</span>
            </div>
            <div class="catalog-grid" id="catalogGrid"></div>
          </section>

          <footer class="status-strip library-footer" aria-label="Library status">
            <div>
              <p class="eyebrow">Library</p>
              <h1 id="dbTitle">Getting everything ready</h1>
              <p class="meta-line" id="dbStatus">Loading movies, shows, and episodes...</p>
            </div>
            <div class="status-actions">
              <button class="ghost-button" type="button" id="loadMore">
                <i data-lucide="plus"></i>
                <span>More</span>
              </button>
            </div>
          </footer>
        </section>
      </main>
    </div>

    <div class="modal-layer" id="detailModal" hidden>
      <section class="detail-dialog" role="dialog" aria-modal="true" aria-label="TV show details">
        <button class="icon-button modal-close" type="button" id="closeDetailModal" aria-label="Close details" title="Close details">
          <i data-lucide="x"></i>
        </button>
        <section class="show-detail" id="showDetail" aria-label="TV show episodes" hidden>
          <div class="show-hero" id="showHero">
            <div>
              <p class="eyebrow" id="showEyebrow">TV Show</p>
              <h2 id="showTitle">Select a show</h2>
              <p class="meta-line" id="showMeta"></p>
            </div>
            <button class="primary-button" type="button" id="resumeShow" disabled>
              <i data-lucide="play"></i>
              <span>Resume</span>
            </button>
          </div>
          <div class="season-tabs" id="seasonTabs"></div>
          <div class="episode-browser" id="episodeBrowser"></div>
        </section>
      </section>
    </div>

    <div class="modal-layer compact-modal" id="idModal" hidden>
      <section class="id-dialog" role="dialog" aria-modal="true" aria-labelledby="idModalTitle">
        <div class="modal-heading">
          <h2 id="idModalTitle">Open by ID</h2>
          <button class="icon-button compact" type="button" id="closeIdModal" aria-label="Close open by ID" title="Close open by ID">
            <i data-lucide="x"></i>
          </button>
        </div>
        <form class="manual-open-form" id="manualForm">
          <label>
            <span>Type</span>
            <select id="manualType" aria-label="Media type">
              <option value="movie">Movie</option>
              <option value="tv">TV Episode</option>
            </select>
          </label>
          <label class="manual-id-label">
            <span>ID</span>
            <span class="manual-search-row">
              <input id="manualId" type="text" placeholder="IMDB or TMDB ID" autocomplete="off">
              <button class="icon-button" type="submit" aria-label="Open ID" title="Open ID">
                <i data-lucide="arrow-right"></i>
              </button>
            </span>
          </label>
          <div class="manual-episode-fields">
            <label>
              <span>Season</span>
              <input id="manualSeason" type="number" min="1" value="1" aria-label="Season">
            </label>
            <label>
              <span>Episode</span>
              <input id="manualEpisode" type="number" min="1" value="1" aria-label="Episode">
            </label>
          </div>
        </form>
      </section>
    </div>

    <template id="cardTemplate">
      <article class="media-card">
        <button class="poster-button" type="button">
          <img alt="" loading="lazy">
          <span class="poster-fallback"></span>
          <span class="play-badge"><i data-lucide="play"></i></span>
        </button>
        <div class="card-body">
          <div class="card-title-row">
            <h3></h3>
            <button class="icon-button compact watch-button" type="button" aria-label="Toggle saved" title="Toggle saved">
              <i data-lucide="bookmark"></i>
            </button>
          </div>
          <p class="meta-line"></p>
          <div class="tag-line"></div>
        </div>
      </article>
    </template>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
